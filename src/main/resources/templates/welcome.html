<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <div class="text-center py-16">
        <h1 class="text-4xl font-bold text-gray-900 mb-4">Welcome to Football Data!</h1>
        <p class="text-xl text-gray-500 mb-8">Track football clubs and players from around the world.</p>
        <a th:href="@{/clubs}"
           class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg text-lg transition-colors">
            Find a Club
        </a>
    </div>

    <div class="mt-4">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Leagues</h2>

        <div th:if="${leagues == null or leagues.isEmpty()}" class="text-gray-500 text-sm">
            No leagues yet.
            <a th:href="@{/leagues/new}" class="text-blue-600 hover:underline ml-1">Create one!</a>
        </div>

        <div th:if="${leagues != null and !leagues.isEmpty()}"
             class="bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-3 text-left font-medium text-gray-500">League</th>
                        <th class="px-6 py-3 text-left font-medium text-gray-500">Country</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="league : ${leagues}" class="border-b border-gray-100 last:border-0 hover:bg-gray-50">
                        <td class="px-6 py-3">
                            <a th:href="@{/leagues/{id}/clubs(id=${league.leagueId})}"
                               th:text="${league.leagueName}"
                               class="text-blue-600 hover:text-blue-800 font-medium"></a>
                        </td>
                        <td class="px-6 py-3 text-gray-600" th:text="${league.country}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
