<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <h1 class="text-2xl font-bold text-gray-900 mb-6"
        th:text="${playerId != null} ? 'Edit Player' : 'Create Player'">Create Player</h1>

    <form th:action="${playerId != null}
                      ? @{/clubs/{c}/players/{p}(c=${clubId},p=${playerId})}
                      : @{/clubs/{c}/players(c=${clubId})}"
          th:object="${playerRequestDTO}"
          method="post"
          class="bg-white border border-gray-200 rounded-lg p-8 shadow-sm max-w-lg">

        <input type="hidden" th:field="*{clubId}"/>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            <input type="text" th:field="*{firstName}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="e.g. Diego"/>
            <p th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"
               class="text-red-500 text-xs mt-1"></p>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
            <input type="text" th:field="*{lastName}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="e.g. Maradona"/>
            <p th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"
               class="text-red-500 text-xs mt-1"></p>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Nationality</label>
            <input type="text" th:field="*{nationality}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="e.g. Argentina"/>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Birth Date</label>
            <input type="date" th:field="*{birthDate}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Birth Place</label>
            <input type="text" th:field="*{birthPlace}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="e.g. Buenos Aires, Argentina"/>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Position</label>
            <select th:field="*{position}"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">-- Select position --</option>
                <option value="Goalkeeper">Goalkeeper</option>
                <option value="Centre-Back">Centre-Back</option>
                <option value="Left-Back">Left-Back</option>
                <option value="Right-Back">Right-Back</option>
                <option value="Defensive Midfield">Defensive Midfield</option>
                <option value="Central Midfield">Central Midfield</option>
                <option value="Attacking Midfield">Attacking Midfield</option>
                <option value="Left Winger">Left Winger</option>
                <option value="Right Winger">Right Winger</option>
                <option value="Centre-Forward">Centre-Forward</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Weight (kg)</label>
            <input type="number" step="0.1" th:field="*{weight}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="e.g. 68.5"/>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Height (m)</label>
            <input type="number" step="0.01" th:field="*{height}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="e.g. 1.72"/>
        </div>

        <div class="flex gap-3">
            <button type="submit"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-medium transition-colors">
                Save Player
            </button>
            <a th:href="@{/clubs/{c}(c=${clubId})}"
               class="flex-1 text-center bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-medium transition-colors">
                Cancel
            </a>
        </div>
    </form>
</section>
</body>
</html>
