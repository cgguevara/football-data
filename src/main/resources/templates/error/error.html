<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — Football Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="text-center">
        <p class="text-6xl font-bold text-gray-300 mb-4" th:text="${status}">Error</p>
        <h1 class="text-2xl font-semibold text-gray-700 mb-2" th:text="${error}">Something went wrong</h1>
        <p class="text-gray-500 mb-6" th:text="${message}">An unexpected error occurred.</p>
        <a href="/clubs" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded transition-colors">
            Back to Clubs
        </a>
    </div>
</body>
</html>
