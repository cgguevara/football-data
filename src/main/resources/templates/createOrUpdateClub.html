<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <h1 class="text-2xl font-bold text-gray-900 mb-6"
        th:text="${clubId != null} ? 'Edit Club' : 'Create Club'">Create Club</h1>

    <form th:action="${clubId != null} ? @{/clubs/{id}(id=${clubId})} : @{/clubs}"
          th:object="${clubRequestDTO}"
          method="post"
          class="bg-white border border-gray-200 rounded-lg p-8 shadow-sm max-w-lg">

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Club Name</label>
            <input type="text" th:field="*{clubName}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="e.g. Arsenal FC"/>
            <p th:if="${#fields.hasErrors('clubName')}" th:errors="*{clubName}"
               class="text-red-500 text-xs mt-1"></p>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
            <input type="text" th:field="*{city}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="e.g. London"/>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Year Founded</label>
            <input type="number" th:field="*{founded}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="e.g. 1886"/>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Stadium</label>
            <input type="text" th:field="*{stadium}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="e.g. Emirates Stadium"/>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Capacity</label>
            <input type="number" th:field="*{capacity}"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="e.g. 60000"/>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-medium transition-colors">
            Save Club
        </button>
    </form>
</section>
</body>
</html>
