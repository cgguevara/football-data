<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<body>
<section>
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Find a Club</h1>

    <form th:action="@{/clubs}" method="get" class="flex gap-3 mb-8">
        <input type="text" name="name" th:value="${name}"
               placeholder="Enter club name"
               class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm transition-colors">
            Find Club
        </button>
        <a th:href="@{/clubs/new}"
           class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg text-sm transition-colors">
            Add Club
        </a>
    </form>

    <div th:if="${club != null}" class="bg-white border border-gray-200 rounded-lg p-6 shadow-sm max-w-md">
        <h2 class="text-lg font-semibold text-gray-800 mb-1" th:text="${club.clubName}"></h2>
        <p class="text-sm text-gray-500 mb-4" th:text="${club.city}"></p>
        <a th:href="@{/clubs/{id}(id=${club.clubId})}"
           class="text-blue-600 hover:underline text-sm">View Details →</a>
    </div>

    <p th:if="${notFound}" class="text-gray-500 text-sm">
        No club found for "<span th:text="${name}"></span>".
    </p>
</section>
</body>
</html>
